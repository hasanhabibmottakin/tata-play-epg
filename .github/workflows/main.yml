name: Daily Tata Play EPG Fetch

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  fetch-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install required library
        run: pip install requests

      - name: Fetch API and Generate Data
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          HEADERS_JSON: ${{ secrets.HEADERS_JSON }}
        run: |
          python - << 'EOF'
          import requests
          import json
          import xml.etree.ElementTree as ET
          from datetime import datetime, timedelta
          import time
          import os

          BASE_URL = os.environ.get("BASE_URL")
          headers_env = os.environ.get("HEADERS_JSON")

          if not BASE_URL or not headers_env:
              print("❌ Error: Missing Secrets")
              exit(1)

          try:
              HEADERS = json.loads(headers_env)
          except json.JSONDecodeError:
              print("❌ Error: Invalid JSON")
              exit(1)

          LIMIT = 20
          DAYS_TO_FETCH = 4
          all_channels = {}

          for i in range(DAYS_TO_FETCH):
              current_date = (datetime.now() + timedelta(days=i)).strftime('%Y-%m-%d')
              api_date = f"{current_date}T00:00:00.000+00:00"
              print(f"\n📡 Fetching for Date: {current_date}")
              
              offset = 0
              total = 1

              while offset < total:
                  params = {
                      "date": api_date,
                      "languageFilters": "",
                      "genreFilters": "",
                      "limit": LIMIT,
                      "offset": offset
                  }

                  try:
                      response = requests.get(BASE_URL, params=params, headers=HEADERS, timeout=20)
                      
                      try:
                          res_json = response.json()
                          has_data = bool(res_json.get("data"))
                      except:
                          has_data = False

                      if response.status_code != 200 or not has_data:
                          params["date"] = ""
                          response = requests.get(BASE_URL, params=params, headers=HEADERS, timeout=20)

                      if response.status_code == 200:
                          result = response.json()
                          data_part = result.get("data", {})
                          total = data_part.get("total", 0)
                          channels = data_part.get("channelList", [])

                          if not channels:
                              break

                          for ch in channels:
                              cid = ch['id']
                              if cid not in all_channels:
                                  all_channels[cid] = ch
                              else:
                                  all_channels[cid]['epg'].extend(ch.get('epg', []))

                          print(f"✅ Offset {offset}/{total} Done...", end="\r")
                          offset += LIMIT
                          time.sleep(0.5)
                      else:
                          print(f"\n❌ Error {response.status_code}")
                          print(f"🛑 Debug Response: {response.text[:1000]}")
                          break
                  except Exception as e:
                      print(f"\n⚠️ Exception Error: {e}")
                      break

          final_data = list(all_channels.values())

          if final_data:
              with open("tata_data.json", "w", encoding="utf-8") as f:
                  json.dump(final_data, f, indent=4, ensure_ascii=False)
              
              root = ET.Element("tv")
              for ch in final_data:
                  c_elem = ET.SubElement(root, "channel", id=str(ch['id']))
                  ET.SubElement(c_elem, "display-name").text = ch.get('title')
                  for e in ch.get('epg', []):
                      p_elem = ET.SubElement(root, "programme", channel=str(ch['id']))
                      p_elem.set("start", str(e.get('startTime')))
                      p_elem.set("stop", str(e.get('endTime')))
                      ET.SubElement(p_elem, "title").text = e.get('title')
                      ET.SubElement(p_elem, "desc").text = str(e.get('desc'))

              tree = ET.ElementTree(root)
              tree.write("tata_data.xml", encoding="utf-8", xml_declaration=True)
              print(f"\n🎉 Successfully saved {len(final_data)} channels to JSON & XML!")
          else:
              print("\n⚠️ No data was fetched. Skipping file creation.")
          EOF

      - name: Commit and Push files
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          if [ -f "tata_data.xml" ] && [ -f "tata_data.json" ]; then
            git add tata_data.json tata_data.xml
            git commit -m "Automated daily EPG update" || echo "No changes to commit"
            git push
          else
            echo "⚠️ No data files found. Skipping commit."
          fi
