name: Update EPG Data

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run Scraper
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          HEADERS_JSON: ${{ secrets.HEADERS_JSON }}
        run: |
          python -c "
          import requests
          import json
          import os
          import xml.etree.ElementTree as ET
          from datetime import datetime, timedelta
          import time

          BASE_URL = os.getenv('BASE_URL')
          HEADERS = json.loads(os.getenv('HEADERS_JSON'))

          LIMIT = 20
          DAYS_TO_FETCH = 1

          def fetch_data():
              all_channels = {}
              for i in range(DAYS_TO_FETCH):
                  # API date format fixing
                  current_date = (datetime.now() + timedelta(days=i)).strftime('%Y-%m-%d')
                  api_date = f'{current_date}T00:00:00.000Z' 
                  
                  print(f'Testing for Date: {current_date}')
                  
                  offset = 0
                  total = 1 
                  while offset < total:
                      # Parameters as per successful web requests
                      params = {
                          'date': api_date,
                          'languageFilters': '',
                          'genreFilters': '',
                          'limit': str(LIMIT),
                          'offset': str(offset)
                      }
                      
                      try:
                          response = requests.get(BASE_URL, params=params, headers=HEADERS, timeout=30)
                          
                          if response.status_code == 200:
                              result = response.json()
                              data_part = result.get('data', {})
                              total = data_part.get('total', 0)
                              channels = data_part.get('channelList', [])
                              
                              if not channels: break
                                  
                              for ch in channels:
                                  cid = ch['id']
                                  if cid not in all_channels:
                                      all_channels[cid] = ch
                                  else:
                                      all_channels[cid].setdefault('epg', []).extend(ch.get('epg', []))
                              
                              print(f'Offset: {offset} Success | Total: {total}', end='\r')
                              offset += LIMIT
                              time.sleep(0.5)
                          else:
                              print(f'\nAPI Error: {response.status_code} | Msg: {response.text}')
                              break
                      except Exception as e:
                          print(f'\nRequest Failed: {e}')
                          break
              return list(all_channels.values())

          data = fetch_data()

          if data:
              print(f'\nTotal Channels: {len(data)}')
              root = ET.Element('tv')
              for ch in data:
                  c_elem = ET.SubElement(root, 'channel', id=str(ch['id']))
                  ET.SubElement(c_elem, 'display-name').text = ch.get('title')
                  for e in ch.get('epg', []):
                      p_elem = ET.SubElement(root, 'programme', channel=str(ch['id']))
                      p_elem.set('start', str(e.get('startTime')))
                      p_elem.set('stop', str(e.get('endTime')))
                      ET.SubElement(p_elem, 'title').text = e.get('title')
                      ET.SubElement(p_elem, 'desc').text = e.get('desc')
              
              tree = ET.ElementTree(root)
              tree.write('tata_data.xml', encoding='utf-8', xml_declaration=True)
              with open('tata_data.json', 'w', encoding='utf-8') as f:
                  json.dump(data, f, indent=4, ensure_ascii=False)
          else:
              print('\nNo data found to save.')
          "

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git commit -m "Update $(date)" || echo "No changes"
          git push
